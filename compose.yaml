services:
  db:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-obesity}
      POSTGRES_USER: ${POSTGRES_USER:-obesity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build: .
    environment: &app-env
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["sh", "-c", "alembic upgrade head && python -m seeds.domain_options"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    environment: *app-env
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
    stop_grace_period: 30s
    restart: unless-stopped

volumes:
  postgres-data:
