name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.5-alpine
        env:
          POSTGRES_DB: obesity_test
          POSTGRES_USER: obesity
          POSTGRES_PASSWORD: test-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U obesity -d obesity_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_ENV: testing
      DATABASE_URL: postgresql+psycopg://obesity:test-only@localhost:5432/obesity_test
      RUN_POSTGRES_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10.18"
          cache: pip
      - run: python -m pip install --upgrade pip==26.1.2
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check app seeds migrations tests
      - run: python -m ruff format --check app seeds migrations tests
      - run: python -m mypy app seeds
      - run: alembic upgrade head
      - run: python -m seeds.domain_options
      - run: python -m seeds.domain_options
      - run: python -m pytest --cov=app --cov-report=term-missing
      - run: docker build --tag obesity-data-api:test .
